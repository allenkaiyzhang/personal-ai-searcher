name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: personal-ai-searcher-vps-deploy
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: ${{ github.workspace }}
      API_KEY: ""
      API_TOKEN: ""
      DEEPSEEK_API_KEY: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          pip install pytest

      - name: Compile Python files
        run: |
          . .venv/bin/activate
          python -m compileall .

      - name: Run tests
        run: |
          . .venv/bin/activate
          python -c "import app; print(app.__file__)"
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory, skipping pytest."
          fi

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            whoami
            cd /opt/personal-ai-searcher
            if ! git pull --ff-only; then
              echo "git pull failed. Discarding local tracked changes and retrying."
              git status --short
              git restore --source=HEAD --staged --worktree .
              git pull --ff-only
            fi
            chmod +x scripts/deploy.sh scripts/smoke_test.sh scripts/tail_logs.sh
            scripts/deploy.sh
            scripts/smoke_test.sh
